<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c2030"/>
      <stop offset="100%" stop-color="#0d0f14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE033"/>
      <stop offset="100%" stop-color="#FFA800"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>

  <!-- Outer gold border ring -->
  <rect x="10" y="10" width="492" height="492" rx="108" ry="108"
        fill="none" stroke="rgba(255,214,0,0.22)" stroke-width="3"/>

  <!-- 554 text - smaller and centered -->
  <text x="256" y="295"
        font-family="Impact, 'Arial Black', Arial, sans-serif"
        font-size="130"
        font-weight="900"
        text-anchor="middle"
        fill="url(#gold)">554</text>

</svg>
